<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOS v1.0.0 - Executive Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom smooth caret animation for the terminal */
        @keyframes blink { 50% { opacity: 0; } }
        .custom-caret { animation: blink 1s step-start infinite; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.4); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.7); }
    </style>
<link rel="stylesheet" href="styles.css">

</head>
<body class="bg-[#0b0f19] text-[#a5b4fc] font-mono h-screen overflow-hidden select-none flex flex-col justify-between">

    <main id="desktop" class="relative flex-1 p-6 grid grid-cols-1 gap-6 items-start justify-items-start content-start">
        
        <button onclick="openWindow('terminal')" class="flex flex-col items-center gap-1 w-20 group cursor-pointer focus:outline-none">
            <div class="p-3 bg-slate-900/40 rounded-xl border border-indigo-500/10 group-hover:border-indigo-500/40 group-hover:bg-indigo-500/10 transition duration-200 backdrop-blur-sm">
                <i data-lucide="terminal" class="w-7 h-7 text-indigo-400"></i>
            </div>
            <span class="text-[11px] text-slate-400 font-medium tracking-wide text-center">terminal.sh</span>
        </button>

        <button onclick="openWindow('projects')" class="flex flex-col items-center gap-1 w-20 group cursor-pointer focus:outline-none">
            <div class="p-3 bg-slate-900/40 rounded-xl border border-emerald-500/10 group-hover:border-emerald-500/40 group-hover:bg-emerald-500/10 transition duration-200 backdrop-blur-sm">
                <i data-lucide="folder-git" class="w-7 h-7 text-emerald-400"></i>
            </div>
            <span class="text-[11px] text-slate-400 font-medium tracking-wide text-center">projects.src</span>
        </button>

        <div id="window-terminal" class="absolute top-12 left-4 md:left-1/4 w-[92%] max-w-2xl bg-slate-950/90 backdrop-blur-md border border-indigo-500/30 rounded-lg shadow-2xl overflow-hidden flex flex-col z-10 hidden">
            <div class="bg-slate-900/80 px-4 py-2 flex items-center justify-between border-b border-indigo-500/10">
                <div class="flex items-center gap-2">
                    <i data-lucide="terminal" class="w-4 h-4 text-indigo-400"></i>
                    <span class="text-xs font-semibold tracking-wider text-slate-400">guest@devos:~</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="closeWindow('terminal')" class="w-3 h-3 rounded-full bg-rose-500/70 hover:bg-rose-500 cursor-pointer transition"></button>
                </div>
            </div>
            <div id="terminal-body" class="p-4 h-80 overflow-y-auto text-sm space-y-2 text-slate-300">
                <div class="text-indigo-400 font-semibold">DevOS [Version 1.0.0]</div>
                <div class="text-slate-500 text-xs">Type <span class="text-emerald-400 font-bold">'help'</span> to view system utilities.</div>
                
                <div class="flex items-center gap-2 pt-1">
                    <span class="text-emerald-400 font-bold">~$</span>
                    <input type="text" id="terminal-input" class="bg-transparent border-none outline-none flex-1 text-slate-100 caret-transparent" autofocus autocomplete="off font-mono">
                    <span class="w-2 h-4 bg-indigo-400 custom-caret -ml-2"></span>
                </div>
            </div>
        </div>

    </main>

    <footer class="bg-slate-950/60 backdrop-blur-md border-t border-slate-900/80 px-6 py-2.5 flex items-center justify-between text-xs text-slate-500 tracking-wider">
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span class="text-slate-400 font-medium">SYS_STATUS: ACTIVE</span>
        </div>
        <div id="system-clock" class="font-medium text-slate-400">00:00:00</div>
    </footer>

    <script>lucide.createIcons();</script>
    <script src="app.js"></script>
</body>
</html>
